name: Refactor Scan

on:
  schedule:
    - cron: '0 8 * * *'   # daily at 08:00 UTC
  workflow_dispatch:        # allow manual triggering

permissions:
  contents: read
  issues: write

jobs:
  refactor-scan:
    name: Agentic Refactor Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests (collector step)
        run: ./gradlew test --no-daemon
        continue-on-error: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run refactor scan orchestrator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODEL: claude-sonnet-4.6
          ISSUE_TITLE: "Automated Refactor Report (daily)"
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: node .github/scripts/refactor-scan.mjs

      - name: Upload evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refactor-evidence
          path: evidence/**
          if-no-files-found: warn

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refactor-reports
          path: reports/**
          if-no-files-found: warn
