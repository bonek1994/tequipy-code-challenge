name: Performance Test

# Opt-in: triggered manually from the GitHub Actions tab.
# Go to Actions → Performance Test → Run workflow, then enter the PR number.
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to run the performance test against'
        required: true
        type: string

jobs:
  # ── Job 1 ─────────────────────────────────────────────────────────────────
  # Checks out the PR's code and runs the performance tests.
  # This job intentionally has NO write permissions so that untrusted PR code
  # cannot access the GitHub token in a harmful way.
  run-tests:
    name: Execute Performance Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.inputs.pr_number }}/head
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Restore-only cache: we never write back from untrusted PR code to avoid
      # cache poisoning of the default-branch Gradle cache.
      - name: Restore Gradle cache (read-only)
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run performance tests
        run: ./gradlew performanceTest --no-daemon

      - name: Upload performance report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: build/performance-report.md
          if-no-files-found: warn

  # ── Job 2 ─────────────────────────────────────────────────────────────────
  # Posts the performance report as a PR comment.
  # This job has write permissions but never executes PR code — it only reads
  # the artifact produced by the previous job.
  post-comment:
    name: Post Performance Report
    needs: run-tests
    # Only run when the test job actually executed (success or failure), not if it was skipped/cancelled
    if: needs.run-tests.result == 'success' || needs.run-tests.result == 'failure'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Download performance report artifact
        uses: actions/download-artifact@v4
        with:
          name: performance-report

      - name: Post report as PR comment
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'performance-report.md';
            if (!fs.existsSync(reportPath)) {
              console.log('Performance report not found – skipping comment.');
              return;
            }
            const report = fs.readFileSync(reportPath, 'utf8');
            const marker = '<!-- performance-report -->';
            const body = `${marker}\n${report}`;
            const prNumber = parseInt('${{ github.event.inputs.pr_number }}', 10);

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
