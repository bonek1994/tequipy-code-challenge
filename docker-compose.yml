services:

  postgres:
    image: postgres:15-alpine
    container_name: tequipy-postgres
    environment:
      POSTGRES_DB: tequipy
      POSTGRES_USER: tequipy
      POSTGRES_PASSWORD: tequipy
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tequipy -d tequipy"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: tequipy-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      start_period: 30s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tequipy-app
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      APP_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: tequipy
      DB_USERNAME: tequipy
      DB_PASSWORD: tequipy
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    ports:
      - "8080:8080"

volumes:
  postgres-data:

