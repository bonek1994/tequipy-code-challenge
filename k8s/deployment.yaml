apiVersion: apps/v1
kind: Deployment
metadata:
  name: tequipy-app
  labels:
    app: tequipy-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tequipy-app
  template:
    metadata:
      labels:
        app: tequipy-app
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - until pg_isready -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USERNAME"; do echo "waiting for postgres"; sleep 2; done
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: tequipy-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: tequipy-config
                  key: DB_PORT
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: tequipy-secret
                  key: DB_USERNAME
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              count=0; max=30;
              until nc -z "$RABBITMQ_HOST" "$RABBITMQ_PORT"; do
                count=$((count+1));
                if [ "$count" -ge "$max" ]; then echo "timed out waiting for rabbitmq"; exit 1; fi;
                echo "waiting for rabbitmq ($count/$max)"; sleep 2;
              done
          env:
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: tequipy-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: tequipy-config
                  key: RABBITMQ_PORT
      containers:
        - name: tequipy-app
          image: tequipy-code-challenge:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: APP_PORT
              valueFrom:
                configMapKeyRef:
                  name: tequipy-config
                  key: APP_PORT
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: tequipy-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: tequipy-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: tequipy-config
                  key: DB_NAME
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: tequipy-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tequipy-secret
                  key: DB_PASSWORD
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: tequipy-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: tequipy-config
                  key: RABBITMQ_PORT
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: tequipy-secret
                  key: RABBITMQ_USERNAME
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tequipy-secret
                  key: RABBITMQ_PASSWORD
          startupProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
